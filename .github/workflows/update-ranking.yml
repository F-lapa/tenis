name: Atualizar ranking ATP

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: write

jobs:
  atualizar-ranking:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependências
        run: npm install

      - name: Instalar navegador
        run: npx playwright install --with-deps chromium

      - name: Atualizar ranking
        run: npm run update-ranking

      - name: Salvar ranking atualizado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/ranking.json

          if git diff --cached --quiet; then
            echo "Nenhuma alteração no ranking."
            exit 0
          fi

          git commit -m "Atualiza ranking ATP"
          git push
